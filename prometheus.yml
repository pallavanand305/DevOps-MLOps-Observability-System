global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: 'mlops-control-plane'
    static_configs:
      - targets: ['host.docker.internal:9091']
        labels:
          service: 'api-gateway'
      - targets: ['host.docker.internal:9092']
        labels:
          service: 'model-monitor'
      - targets: ['host.docker.internal:9093']
        labels:
          service: 'data-validator'
      - targets: ['host.docker.internal:9094']
        labels:
          service: 'retraining-orchestrator'
      - targets: ['host.docker.internal:9095']
        labels:
          service: 'deployment-manager'
      - targets: ['host.docker.internal:9096']
        labels:
          service: 'alert-manager'
      - targets: ['host.docker.internal:9097']
        labels:
          service: 'lineage-tracker'
